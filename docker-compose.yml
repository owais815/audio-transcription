version: '3.9'

services:
  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build: .
    command: node src/server.js
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/transcription
      - REDIS_HOST=redis
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker Process ─────────────────────────────────────────────────────────
  worker:
    build: .
    command: node src/queue/worker.js
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/transcription
      - REDIS_HOST=redis
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 2   # Two worker containers = up to 6 concurrent jobs (3 each)
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # Persistent mode — jobs survive restarts
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible local storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'   # Web console: http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO bucket initialiser (runs once then exits) ────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/transcription-audio;
        echo 'Bucket created';
      "

volumes:
  mongo_data:
  redis_data:
  minio_data:
